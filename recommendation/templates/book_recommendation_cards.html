{% load static %}

<!-- Book Recommendation Cards -->
<div id="recommendationSection">
    <!-- Section Header -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h2 class="font-display text-3xl md:text-4xl font-bold text-gray-900" id="recommendationTitle">
                Rekomendasi Buku
            </h2>
            <p class="font-sans text-gray-600 mt-1" id="recommendationSubtitle">
                Berdasarkan minat bacamu
            </p>
        </div>
        <div class="flex gap-2" id="filterButtons">
            <button onclick="switchToPersonal()" id="personalFilterBtn" class="px-4 py-2 bg-gray-900 text-white text-sm font-sans font-semibold rounded-lg">
                Untukmu
            </button>
            <button onclick="switchToPopular()" id="popularFilterBtn" class="px-4 py-2 border border-gray-300 text-gray-700 text-sm font-sans font-semibold rounded-lg hover:bg-gray-50">
                Populer
            </button>
        </div>
    </div>
    
    <!-- Loading State -->
    <div id="recommendationLoading" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
        {% for i in "12345" %}
        <div class="animate-pulse">
            <div class="bg-gray-200 rounded-xl aspect-[3/4] mb-3"></div>
            <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
            <div class="h-3 bg-gray-200 rounded w-1/2"></div>
        </div>
        {% endfor %}
    </div>
    
    <!-- Empty State - Has Preferences but No Matching Books -->
    <div id="recommendationNoMatch" class="hidden text-center py-12">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 rounded-full mb-4">
            <span class="text-3xl">🔍</span>
        </div>
        <h3 class="font-display text-xl font-bold text-gray-900 mb-2">Tidak ada buku yang cocok</h3>
        <p class="font-sans text-gray-600 mb-4">Tidak ada buku yang sesuai dengan kategori minatnya saat ini</p>
        <button onclick="showPreferenceModal()" class="px-6 py-2 bg-gray-900 text-white rounded-lg font-sans font-semibold text-sm hover:bg-gray-800 transition-colors">
            Ubah Preferensi
        </button>
    </div>
    
    <!-- Book Cards Grid -->
    <div id="recommendationCards" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
        <!-- Cards will be rendered here -->
    </div>
    
    <!-- View All Link -->
    <div id="viewAllLink" class="text-center mt-8 hidden">
        <a href="{% url 'book:book_list' %}" class="inline-block px-6 py-3 border-2 border-gray-900 text-gray-900 font-sans font-semibold rounded-lg hover:bg-gray-900 hover:text-white transition-colors">
            Lihat Semua Buku
        </a>
    </div>
</div>

<!-- Book Card Template (hidden) -->
<template id="bookCardTemplate">
    <div class="book-card group cursor-pointer" onclick="goToBookDetail(this.dataset.bookId)">
        <div class="relative bg-gradient-to-br from-gray-200 to-gray-400 rounded-xl overflow-hidden shadow-md hover:shadow-xl transition-all duration-300 aspect-[3/4] flex items-center justify-center mb-3">
            <!-- Cover Image or Placeholder -->
            <img class="book-cover absolute inset-0 w-full h-full object-cover" src="" alt="" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="book-placeholder absolute inset-0 w-full h-full bg-gradient-to-br from-gray-300 to-gray-500 flex items-center justify-center p-4" style="display: none;">
                <span class="book-placeholder-text text-white font-display text-lg font-bold text-center"></span>
            </div>
            
            <!-- Availability Badge -->
            <div class="absolute top-2 right-2">
                <span class="availability-badge px-2 py-1 rounded-full text-xs font-sans font-semibold"></span>
            </div>
            
            <!-- Interest Badge -->
            <div class="absolute top-2 left-2 interest-badge hidden">
                <span class="bg-gray-900 text-white px-2 py-1 rounded-full text-xs font-sans font-semibold">
                    Sesuai Minatmu ⭐
                </span>
            </div>
            
            <!-- Hover Overlay -->
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-4">
                <button class="bg-white text-gray-900 px-4 py-2 rounded-lg font-sans font-semibold text-sm hover:bg-gray-100 transition-colors w-full">
                    Lihat Detail
                </button>
            </div>
        </div>
        
        <!-- Book Info -->
        <div>
            <h3 class="book-title font-display font-bold text-gray-900 text-sm line-clamp-2 mb-1"></h3>
            <p class="book-author font-sans text-xs text-gray-600 line-clamp-1 mb-2"></p>
            
            <!-- Rating -->
            <div class="book-rating flex items-center gap-1">
                <div class="stars flex text-yellow-400 text-xs"></div>
                <span class="rating-text font-sans text-xs text-gray-500"></span>
            </div>
            
            <!-- Loan Count (for popular) -->
            <div class="loan-count hidden font-sans text-xs text-gray-500 mt-1"></div>
        </div>
    </div>
</template>

<script>
let currentRecommendationType = 'popular'; // Default to popular books
let userHasPreferences = false;
let isLoggedIn = false;

// Initialize recommendations on page load
document.addEventListener('DOMContentLoaded', function() {
    // Check if user is logged in and has preferences
    checkUserAuth();
    
    // Set default button states (popular selected by default)
    document.getElementById('popularFilterBtn').classList.add('bg-gray-900', 'text-white');
    document.getElementById('popularFilterBtn').classList.remove('border', 'border-gray-300', 'text-gray-700');
    document.getElementById('personalFilterBtn').classList.remove('bg-gray-900', 'text-white');
    document.getElementById('personalFilterBtn').classList.add('border', 'border-gray-300', 'text-gray-700');
    
    // Listen for preference save to refresh
    window.addEventListener('preferencesSaved', function() {
        userHasPreferences = true;
        loadRecommendations();
    });
});

// Check if user is logged in and has preferences
async function checkUserAuth() {
    try {
        const response = await fetch('/recommendation/api/users/preferences/check', {
            headers: {
                'X-CSRFToken': getCookie('csrftoken')
            }
        });
        
        // If response is ok, user is logged in
        if (response.ok) {
            isLoggedIn = true;
            const data = await response.json();
            userHasPreferences = data.has_preferences;
        } else {
            // User is not logged in
            isLoggedIn = false;
            userHasPreferences = false;
        }
        
        // Always load recommendations (default to popular)
        loadRecommendations();
    } catch (error) {
        // Not logged in or error - show popular books
        console.log('User not logged in, showing popular books');
        isLoggedIn = false;
        userHasPreferences = false;
        loadRecommendations();
    }
}

async function loadRecommendations() {
    const loading = document.getElementById('recommendationLoading');
    const cardsContainer = document.getElementById('recommendationCards');
    const noMatchState = document.getElementById('recommendationNoMatch');
    
    loading.classList.remove('hidden');
    cardsContainer.classList.add('hidden');
    noMatchState.classList.add('hidden');
    document.getElementById('viewAllLink').classList.add('hidden');
    
    try {
        const endpoint = currentRecommendationType === 'personal' 
            ? '/recommendation/api/books/recommendations/personalized'
            : '/recommendation/api/books/recommendations';
        
        console.log('Loading recommendations from:', endpoint);
        
        const response = await fetch(endpoint, {
            headers: {
                'X-CSRFToken': getCookie('csrftoken')
            }
        });
        
        const data = await response.json();
        console.log('Recommendations response:', data);
        
        loading.classList.add('hidden');
        
        if (data.recommendations && data.recommendations.length > 0) {
            renderRecommendations(data.recommendations, currentRecommendationType === 'personal');
            cardsContainer.classList.remove('hidden');
            document.getElementById('viewAllLink').classList.remove('hidden');
        } else {
            // Only show "no match" state when user has preferences but no matching books
            // For popular or when no preferences, just show popular books (handled by API fallback)
            if (currentRecommendationType === 'personal' && userHasPreferences) {
                noMatchState.classList.remove('hidden');
            }
            // Otherwise, popular books will be shown (API returns popular as fallback)
        }
    } catch (error) {
        console.error('Error loading recommendations:', error);
        loading.classList.add('hidden');
    }
}

function renderRecommendations(books, showInterestBadge = false) {
    const container = document.getElementById('recommendationCards');
    const template = document.getElementById('bookCardTemplate');
    
    container.innerHTML = '';
    
    books.slice(0, 10).forEach(book => {
        const card = template.content.cloneNode(true);
        
        // Set book data
        const cardElement = card.querySelector('.book-card');
        cardElement.dataset.bookId = book.id;
        
        // Cover
        const coverImg = card.querySelector('.book-cover');
        if (book.cover_url) {
            coverImg.src = book.cover_url;
            coverImg.onerror = function() { this.style.display='none'; this.nextElementSibling.style.display='flex'; };
        } else {
            coverImg.style.display = 'none';
        }
        
        // Placeholder with title
        const placeholder = card.querySelector('.book-placeholder');
        const placeholderText = card.querySelector('.book-placeholder-text');
        placeholderText.textContent = book.title;
        
        // Availability badge
        const availabilityBadge = card.querySelector('.availability-badge');
        if (book.is_available) {
            availabilityBadge.textContent = 'Tersedia';
            availabilityBadge.classList.add('bg-green-100', 'text-green-700');
        } else {
            availabilityBadge.textContent = 'Tidak Tersedia';
            availabilityBadge.classList.add('bg-red-100', 'text-red-700');
        }
        
        // Interest badge
        const interestBadge = card.querySelector('.interest-badge');
        if (showInterestBadge) {
            interestBadge.classList.remove('hidden');
        }
        
        // Book info
        card.querySelector('.book-title').textContent = book.title;
        card.querySelector('.book-author').textContent = book.author;
        
        // Rating
        const starsContainer = card.querySelector('.stars');
        const ratingText = card.querySelector('.rating-text');
        if (book.avg_rating) {
            const fullStars = Math.floor(book.avg_rating);
            const halfStar = book.avg_rating % 1 >= 0.5;
            let starsHtml = '';
            for (let i = 0; i < 5; i++) {
                if (i < fullStars) {
                    starsHtml += '★';
                } else if (i === fullStars && halfStar) {
                    starsHtml += '★';
                } else {
                    starsHtml += '☆';
                }
            }
            starsContainer.innerHTML = starsHtml;
            ratingText.textContent = `(${book.avg_rating})`;
        } else {
            starsContainer.innerHTML = '<span class="text-gray-400">Belum ada rating</span>';
            ratingText.textContent = '';
        }
        
        // Loan count (for popular)
        const loanCount = card.querySelector('.loan-count');
        if (book.loan_count !== undefined) {
            loanCount.textContent = `Dipinjam ${book.loan_count}x`;
            loanCount.classList.remove('hidden');
        }
        
        container.appendChild(card);
    });
}

function switchToPersonal() {
    // Check if user is logged in and has preferences before switching
    if (!isLoggedIn || !userHasPreferences) {
        // Show prompt to set preferences (or login)
        showPreferenceModal();
        return;
    }
    
    currentRecommendationType = 'personal';
    
    document.getElementById('personalFilterBtn').classList.add('bg-gray-900', 'text-white');
    document.getElementById('personalFilterBtn').classList.remove('border', 'border-gray-300', 'text-gray-700');
    
    document.getElementById('popularFilterBtn').classList.remove('bg-gray-900', 'text-white');
    document.getElementById('popularFilterBtn').classList.add('border', 'border-gray-300', 'text-gray-700');
    
    document.getElementById('recommendationTitle').textContent = 'Rekomendasi Buku';
    document.getElementById('recommendationSubtitle').textContent = 'Berdasarkan minat bacamu';
    
    loadRecommendations();
}

function switchToPopular() {
    currentRecommendationType = 'popular';
    
    document.getElementById('popularFilterBtn').classList.add('bg-gray-900', 'text-white');
    document.getElementById('popularFilterBtn').classList.remove('border', 'border-gray-300', 'text-gray-700');
    
    document.getElementById('personalFilterBtn').classList.remove('bg-gray-900', 'text-white');
    document.getElementById('personalFilterBtn').classList.add('border', 'border-gray-300', 'text-gray-700');
    
    document.getElementById('recommendationTitle').textContent = 'Buku Paling Populer';
    document.getElementById('recommendationSubtitle').textContent = 'Buku yang paling banyak dipinjam bulan ini';
    
    // For popular, we don't need preferences, just load directly
    loadRecommendations();
}

function goToBookDetail(bookId) {
    window.location.href = `/book/catalog/${bookId}/`;
}

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
</script>
