<!-- Preference Modal -->
<div id="preferenceModal" class="fixed inset-0 z-50 hidden">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closePreferenceModal()"></div>
    
    <!-- Modal Content -->
    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full max-w-lg mx-4">
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
            <!-- Header -->
            <div class="bg-gradient-to-r from-gray-900 to-gray-800 p-6 text-white">
                <h2 class="font-display text-2xl font-bold">Atur Preferensi Minat Baca</h2>
                <p class="text-gray-300 text-sm mt-1">Pilih minimal 1 dan maksimal 5 kategori buku yang kamu suka</p>
            </div>
            
            <!-- Body -->
            <div class="p-6 max-h-[60vh] overflow-y-auto">
                <div id="categoryLoading" class="text-center py-4">
                    <svg class="animate-spin h-8 w-8 mx-auto text-gray-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <p class="text-gray-500 mt-2">Memuat kategori...</p>
                </div>
                
                <div id="categoryList" class="grid grid-cols-2 gap-3 hidden">
                    <!-- Categories will be loaded dynamically -->
                </div>
                
                <p id="categoryCount" class="text-center text-sm text-gray-500 mt-4">
                    Dipilih: <span id="selectedCount">0</span>/5
                </p>
                
                <p id="errorMessage" class="text-red-500 text-sm text-center mt-3 hidden"></p>
            </div>
            
            <!-- Footer -->
            <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex justify-end gap-3">
                <button onclick="closePreferenceModal()" class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-100 transition-colors font-sans text-sm font-semibold">
                    Nanti Saja
                </button>
                <button onclick="savePreferences()" id="saveBtn" class="px-6 py-2 bg-gray-900 text-white rounded-lg hover:bg-gray-800 transition-colors font-sans text-sm font-semibold disabled:opacity-50 disabled:cursor-not-allowed">
                    Simpan Preferensi
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Toast Notification -->
<div id="toast" class="fixed bottom-4 right-4 transform translate-y-full opacity-0 transition-all duration-300 z-50">
    <div class="bg-green-600 text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-3">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
        <span id="toastMessage">Preferensi minat berhasil disimpan</span>
    </div>
</div>

<script>
let selectedCategories = [];
let availableCategories = [];

// Check if user needs to set preferences
async function checkPreferences() {
    try {
        const response = await fetch('/recommendation/api/users/preferences/check', {
            headers: {
                'X-CSRFToken': getCookie('csrftoken')
            }
        });
        const data = await response.json();
        
        if (!data.has_preferences) {
            showPreferenceModal();
        }
    } catch (error) {
        console.error('Error checking preferences:', error);
    }
}

// Show preference modal
function showPreferenceModal() {
    const modal = document.getElementById('preferenceModal');
    modal.classList.remove('hidden');
    loadCategories();
}

// Close preference modal
function closePreferenceModal() {
    document.getElementById('preferenceModal').classList.add('hidden');
}

// Load available categories
async function loadCategories() {
    try {
        const response = await fetch('/recommendation/api/categories');
        const data = await response.json();
        
        availableCategories = data.categories || [];
        
        // Check if user already has preferences
        const prefResponse = await fetch('/recommendation/api/users/preferences', {
            headers: {
                'X-CSRFToken': getCookie('csrftoken')
            }
        });
        const prefData = await prefResponse.json();
        selectedCategories = prefData.categories || [];
        
        renderCategories();
    } catch (error) {
        console.error('Error loading categories:', error);
        document.getElementById('errorMessage').textContent = 'Gagal memuat kategori. Silakan coba lagi.';
        document.getElementById('errorMessage').classList.remove('hidden');
    }
}

// Render category checkboxes
function renderCategories() {
    const container = document.getElementById('categoryList');
    const loading = document.getElementById('categoryLoading');
    
    loading.classList.add('hidden');
    container.classList.remove('hidden');
    
    container.innerHTML = availableCategories.map(category => `
        <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 transition-colors ${selectedCategories.includes(category) ? 'border-gray-900 bg-gray-50' : 'border-gray-200'}">
            <input type="checkbox" 
                   value="${category}" 
                   ${selectedCategories.includes(category) ? 'checked' : ''}
                   onchange="toggleCategory(this)"
                   class="w-4 h-4 text-gray-900 border-gray-300 rounded focus:ring-gray-900">
            <span class="ml-2 text-sm font-sans text-gray-700">${category}</span>
        </label>
    `).join('');
    
    updateCount();
}

// Toggle category selection
function toggleCategory(checkbox) {
    const category = checkbox.value;
    
    if (checkbox.checked) {
        if (selectedCategories.length >= 5) {
            checkbox.checked = false;
            showError('Maksimal 5 kategori yang dapat dipilih');
            return;
        }
        selectedCategories.push(category);
    } else {
        selectedCategories = selectedCategories.filter(c => c !== category);
    }
    
    updateCount();
    updateCheckboxStyles();
    hideError();
}

// Update selected count display
function updateCount() {
    document.getElementById('selectedCount').textContent = selectedCategories.length;
    
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = selectedCategories.length === 0;
}

// Update checkbox styles
function updateCheckboxStyles() {
    const checkboxes = document.querySelectorAll('#categoryList input[type="checkbox"]');
    checkboxes.forEach(checkbox => {
        const label = checkbox.closest('label');
        if (checkbox.checked) {
            label.classList.add('border-gray-900', 'bg-gray-50');
            label.classList.remove('border-gray-200');
        } else {
            label.classList.remove('border-gray-900', 'bg-gray-50');
            label.classList.add('border-gray-200');
        }
    });
}

// Show error message
function showError(message) {
    const errorEl = document.getElementById('errorMessage');
    errorEl.textContent = message;
    errorEl.classList.remove('hidden');
}

// Hide error message
function hideError() {
    document.getElementById('errorMessage').classList.add('hidden');
}

// Save preferences
async function savePreferences() {
    if (selectedCategories.length === 0) {
        showError('Minimal pilih 1 kategori');
        return;
    }
    
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'Menyimpan...';
    
    try {
        const response = await fetch('/recommendation/api/users/preferences', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({
                categories: selectedCategories
            })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            closePreferenceModal();
            showToast('Preferensi minat berhasil disimpan');
            // Trigger event to refresh recommendations
            window.dispatchEvent(new CustomEvent('preferencesSaved'));
        } else {
            showError(data.error || 'Gagal menyimpan preferensi');
        }
    } catch (error) {
        console.error('Error saving preferences:', error);
        showError('Terjadi kesalahan. Silakan coba lagi.');
    } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Simpan Preferensi';
    }
}

// Show toast notification
function showToast(message) {
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toastMessage');
    
    toastMessage.textContent = message;
    toast.classList.remove('translate-y-full', 'opacity-0');
    
    setTimeout(() => {
        toast.classList.add('translate-y-full', 'opacity-0');
    }, 3000);
}

// Get CSRF token
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
    // Only check preferences for logged-in students
    /* {% if user.is_authenticated and user.profile.role == 'student' %} */
    var isStudent = true;
    /* {% else %} */
    var isStudent = false;
    /* {% endif %} */
    if (isStudent) {
        checkPreferences();
    }
});
</script>
